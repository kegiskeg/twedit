name: Security Audit

on:
  push:
    paths:
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'Cargo.lock'
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: rustsec/audit-check@v1.4.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
